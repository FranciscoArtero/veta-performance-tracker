<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c5ce0" />
      <stop offset="100%" stop-color="#5046b0" />
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0d8ff" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)" />
  <!-- Subtle inner shadow/depth -->
  <rect x="8" y="4" width="496" height="504" rx="104" ry="104" fill="none" stroke="#6b52cc" stroke-width="4" opacity="0.3" />
  <!-- Lightning bolt (outlined style) -->
  <path d="M280 80 L160 280 L240 280 L232 432 L352 232 L272 232 Z"
        fill="none"
        stroke="url(#bolt)"
        stroke-width="28"
        stroke-linejoin="round"
        stroke-linecap="round" />
</svg>
